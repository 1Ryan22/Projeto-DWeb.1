<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contato.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Contato</title>
</head>

<body>
    <div class="navbar">
        <a href="index.html">Início</a>
        <a href="sobre.html">Sobre mim</a>
        <a href="Projetos.html">Projetos</a>
        <a href="contato.html" class="ativo">Contato</a>
        <a href="novidades.html">Novidades</a>
    </div>

    <div class="caixa">
        <form id="form-contato">
            <h2>Contato</h2>
            <p class="subtitulo">Entre em contato comigo pelo formulário abaixo</p>

            <input type="text" name="nome" placeholder="Seu nome" required>
            <input type="email" name="email" placeholder="Seu email" required title="Digite um email válido com @">

            <textarea name="mensagem" placeholder="Sua mensagem" required></textarea>

            <button type="submit">Enviar</button>

           
        </form>
    </div>

    <footer>
        <p>© 2026 Ryan Arruda Barreto </p>

        <div class="footer-redes">
            <a href="https://github.com/1Ryan22" target="_blank">
                <i class="fab fa-github"></i>
            </a>

            <a href="https://www.instagram.com/ryanbarreto_22/" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <script>
        emailjs.init("LdoWrtnpHf3gxOLo3");

        document.getElementById("form-contato")
            .addEventListener("submit", function (event) {

                const email = document.querySelector('input[name="email"]').value;
                const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                if (!regex.test(email)) {
                    alert("Por favor, insira um email válido!");
                    event.preventDefault();
                    return;
                }

                event.preventDefault();

                emailjs.sendForm("service_k6pk1k4", "template_lhikysl", this)
                    .then(function () {
                        alert("Mensagem enviada com sucesso!");
                        document.getElementById("form-contato").reset();
                    }, function () {
                        alert("Erro ao enviar");
                    });
            });
    </script>
</body>

</html>
